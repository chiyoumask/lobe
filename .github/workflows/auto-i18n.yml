name: Daily i18n Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-i18n:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure Git
        run: |
          git config --global user.name "lobehubbot"
          git config --global user.email "i@lobehub.com"

      - uses: actions/checkout@v5
        # 移除了无效的 ref 配置，定时任务默认检出主分支

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ secrets.BUN_VERSION || 'latest' }} # 增加默认值防止 secret 为空

      - name: Install deps
        run: bun i

      - name: Update i18n
        # 使用 tee 将日志同时输出到控制台和文件
        run: bun run i18n 2>&1 | tee i18n_update.log
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_PROXY_URL: ${{ secrets.OPENAI_PROXY_URL }}

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          # 如果需要 PR 触发 CI，请确保 GH_TOKEN 是一个具有 repo 权限的 PAT
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          add-paths: |
            locales/**/*.json
          labels: |
            i18n
            automated
            style
          branch: style/auto-i18n
          delete-branch: true
          title: '🤖 style: update i18n'
          commit-message: '💄 style: update i18n'
          body: |
            This PR was automatically generated by the i18n update workflow.

            ## 🤖 Automation Info
            - Workflow: `${{ github.workflow }}`
            - Run ID: `${{ github.run_id }}`

            <details>
            <summary>i18n Update Log (Tail)</summary>

            ```bash
            ${{ env.I18N_LOG }}
            ```
            </details>

      # 备选：如果 cat 日志太长导致 PR 创建失败，可以先读取到环境变量
      - name: Read log
        if: always()
        run: |
          echo "I18N_LOG<<EOF" >> $GITHUB_ENV
          tail -n 50 i18n_update.log >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
